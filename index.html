<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriSense AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        /* CSS styling */
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg-color: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --border-color: #E5E7EB;
            --error: #EF4444;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1.5rem;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            transition: all 0.3s ease;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 1.875rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-top: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.875rem;
        }

        textarea, select {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            resize: vertical;
        }

        textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }

        .btn {
            width: 100%;
            padding: 0.875rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn:disabled {
            background-color: var(--text-muted);
            cursor: not-allowed;
        }

        .error-message {
            color: var(--error);
            font-size: 0.875rem;
            margin-top: 0.5rem;
            display: none;
        }

        /* Loading Spinner */
        .spinner {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Results Section */
        .results {
            display: none;
            margin-top: 2rem;
            border-top: 1px solid var(--border-color);
            padding-top: 2rem;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .score-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.5rem;
            border-radius: 0.75rem;
            margin-bottom: 1.5rem;
            color: white;
        }

        .score-card.high { background-color: var(--success); }
        .score-card.medium { background-color: var(--warning); }
        .score-card.low { background-color: var(--danger); }

        .score-info h2 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.25rem; }
        .score-info p { font-size: 0.875rem; opacity: 0.9; }
        .score-value { font-size: 2.5rem; font-weight: 700; }

        .result-section {
            background-color: var(--bg-color);
            padding: 1.25rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
        }

        .result-section h3 {
            font-size: 1rem;
            color: var(--text-main);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .result-section p, .result-section ul {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
        }
        
        .result-section ul {
            padding-left: 1.5rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1><span class="material-icons">restaurant_menu</span> NutriSense AI</h1>
        <p>Your personal AI nutritionist for a healthier lifestyle</p>
    </div>

    <div class="form-group">
        <label for="foodInput">What did you eat?</label>
        <textarea id="foodInput" rows="3" placeholder="e.g., 2 idlis with sambar, 1 masala dosa, and a cup of filter coffee..." aria-label="Enter the food you ate"></textarea>
        <div id="inputError" class="error-message" role="alert">Please enter what you ate to get an analysis.</div>
    </div>

    <div class="form-group">
        <label for="goalSelect">Your Health Goal</label>
        <select id="goalSelect" aria-label="Select your health goal">
            <option value="General Health">General Health</option>
            <option value="Weight Loss">Weight Loss</option>
            <option value="Muscle Gain">Muscle Gain</option>
            <option value="Diabetes Management">Diabetes Management</option>
        </select>
    </div>

    <button id="analyzeBtn" class="btn" aria-label="Analyze Food">
        <span class="btn-text">Analyze Meal</span>
        <span class="spinner" id="loadingSpinner"></span>
        <span class="material-icons btn-icon">auto_awesome</span>
    </button>
    <div id="apiError" class="error-message" role="alert" style="margin-top: 1rem; text-align: center;"></div>

    <div id="results" class="results" aria-live="polite">
        <div id="scoreCard" class="score-card">
            <div class="score-info">
                <h2>Health Score</h2>
                <p id="caloriesEstimate">Est. Calories: --</p>
            </div>
            <div class="score-value"><span id="scoreValue">0</span>/10</div>
        </div>

        <div class="result-section">
            <h3><span class="material-icons" style="color: var(--success)">check_circle</span> What's Good</h3>
            <div id="goodPoints"></div>
        </div>

        <div class="result-section">
            <h3><span class="material-icons" style="color: var(--warning)">trending_up</span> What to Improve</h3>
            <div id="improvements"></div>
        </div>

        <div class="result-section">
            <h3><span class="material-icons" style="color: var(--primary)">lightbulb</span> Next Time Try</h3>
            <div id="nextTime"></div>
        </div>
    </div>
</div>

<script>
    /**
     * @constant {string} GEMINI_API_KEY
     * Placeholder for the Gemini API key. Never hardcode the real key in production.
     */
    const GEMINI_API_KEY = "YOUR_API_KEY_HERE";

    // DOM Elements
    const foodInput = document.getElementById('foodInput');
    const goalSelect = document.getElementById('goalSelect');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const inputError = document.getElementById('inputError');
    const apiError = document.getElementById('apiError');
    const resultsDiv = document.getElementById('results');
    const btnText = document.querySelector('.btn-text');
    const btnIcon = document.querySelector('.btn-icon');
    const spinner = document.getElementById('loadingSpinner');

    // Result Elements
    const scoreCard = document.getElementById('scoreCard');
    const scoreValue = document.getElementById('scoreValue');
    const caloriesEstimate = document.getElementById('caloriesEstimate');
    const goodPoints = document.getElementById('goodPoints');
    const improvements = document.getElementById('improvements');
    const nextTime = document.getElementById('nextTime');

    /**
     * Validates the food input field.
     * @param {string} input - The text input from the user.
     * @returns {boolean} True if input is valid, false otherwise.
     */
    function validateInput(input) {
        return input.trim().length > 0;
    }

    /**
     * Formats the markdown-like response from Gemini into HTML.
     * @param {string} text - The raw text from the AI.
     * @returns {string} HTML formatted text.
     */
    function formatResponse(text) {
        return text.split('\n')
            .filter(line => line.trim() !== '')
            .map(line => `<p>${line.replace(/^- /, '• ')}</p>`)
            .join('');
    }

    /**
     * Updates the UI based on the health score.
     * @param {number} score - The health score (0-10).
     */
    function updateScoreUI(score) {
        scoreCard.className = 'score-card'; // Reset classes
        if (score >= 8) {
            scoreCard.classList.add('high');
        } else if (score >= 5) {
            scoreCard.classList.add('medium');
        } else {
            scoreCard.classList.add('low');
        }
        scoreValue.textContent = score;
    }

    /**
     * Toggles the loading state of the UI.
     * @param {boolean} isLoading - Whether the app is currently loading data.
     */
    function setLoadingState(isLoading) {
        analyzeBtn.disabled = isLoading;
        if (isLoading) {
            btnText.textContent = 'Analyzing...';
            btnIcon.style.display = 'none';
            spinner.style.display = 'block';
            apiError.style.display = 'none';
            resultsDiv.style.display = 'none';
        } else {
            btnText.textContent = 'Analyze Meal';
            btnIcon.style.display = 'block';
            spinner.style.display = 'none';
        }
    }

    /**
     * Calls the Gemini API to analyze the food.
     * @param {string} food - The food description.
     * @param {string} goal - The user's health goal.
     * @returns {Promise<Object>} The parsed JSON response from the API.
     */
    async function analyzeFoodWithGemini(food, goal) {
        const prompt = `
            Analyze this meal: "${food}" for the goal: "${goal}".
            Return a JSON object ONLY, with NO markdown formatting or code blocks.
            The JSON must have exactly this structure:
            {
                "score": <number 1-10>,
                "calories": "<string estimate, e.g., '450 kcal'>",
                "good": "<string describing what's good>",
                "improve": "<string describing what to improve>",
                "next": "<string suggesting what to eat next time>"
            }
        `;

        const fallbackResponse = {
            score: 5,
            calories: "Unknown",
            good: "You tracked your meal, which is a great first step!",
            improve: "We couldn't analyze this specific meal due to a network or parsing error.",
            next: "Try entering a simpler meal description or check your connection."
        };

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    contents: [{
                        parts: [{
                            text: prompt
                        }]
                    }],
                    generationConfig: {
                        temperature: 0.2
                    }
                })
            });

            if (!response.ok) {
                console.error(`API request failed with status ${response.status}`);
                return fallbackResponse;
            }

            const data = await response.json();
            console.log("Gemini API Response:", data);
            
            let textResponse = data?.candidates?.[0]?.content?.parts?.[0]?.text;
            
            if (!textResponse) {
                console.error("Failed to extract text from API response");
                return fallbackResponse;
            }
            
            // Clean up markdown formatting if Gemini includes it despite instructions
            textResponse = textResponse.replace(/```json/g, '').replace(/```/g, '').trim();
            
            return JSON.parse(textResponse);
        } catch (error) {
            console.error("Error in analyzeFoodWithGemini:", error);
            return fallbackResponse;
        }
    }

    /**
     * Main function to handle the analysis process.
     */
    async function handleAnalysis() {
        const food = foodInput.value;
        const goal = goalSelect.value;

        // Reset errors
        inputError.style.display = 'none';
        apiError.style.display = 'none';

        if (!validateInput(food)) {
            inputError.style.display = 'block';
            foodInput.focus();
            return;
        }

        if (GEMINI_API_KEY === "YOUR_API_KEY_HERE") {
            apiError.textContent = "Error: Please set a valid GEMINI_API_KEY in the code.";
            apiError.style.display = 'block';
            return;
        }

        setLoadingState(true);

        try {
            const analysis = await analyzeFoodWithGemini(food, goal);
            
            // Update UI
            updateScoreUI(analysis.score);
            caloriesEstimate.textContent = `Est. Calories: ${analysis.calories}`;
            goodPoints.innerHTML = formatResponse(analysis.good);
            improvements.innerHTML = formatResponse(analysis.improve);
            nextTime.innerHTML = formatResponse(analysis.next);
            
            resultsDiv.style.display = 'block';
            
            // Scroll to results on mobile
            resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        } catch (error) {
            console.error('Analysis failed:', error);
            apiError.textContent = "Failed to analyze food. Please check your API key and try again.";
            apiError.style.display = 'block';
        } finally {
            setLoadingState(false);
        }
    }

    // Event Listeners
    analyzeBtn.addEventListener('click', handleAnalysis);

    foodInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            handleAnalysis();
        }
    });
</script>

</body>
</html>
